services:
  # Kubercoin Node
  node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kubercoin-node
    restart: unless-stopped
    labels:
      com.kubercoin.protected: "true"
      com.kubercoin.lock: "locked"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
        reservations:
          memory: 256m
    ports:
      - "18633:18633" # P2P network (testnet)
      - "8634:8634" # RPC / REST / WebSocket / Metrics
    volumes:
      - kubercoin-data:/data/kubercoin
      - ./config:/home/kubercoin/.kubercoin:ro
    environment:
      - KUBERCOIN_P2P_ADDR=0.0.0.0:18633
      - RUST_LOG=info
      - KUBERCOIN_NETWORK=testnet
      - KUBERCOIN_RPC_ADDR=0.0.0.0:8634
      - KUBERCOIN_RPC_USER=${RPC_USER:-admin}
      - KUBERCOIN_RPC_PASSWORD=${RPC_PASSWORD:-changeme}
      - KUBERCOIN_API_AUTH_ENABLED=${KUBERCOIN_API_AUTH_ENABLED:-false}
      - KUBERCOIN_API_KEYS=${KUBERCOIN_API_KEYS:-}
      - KUBERCOIN_EXPERIMENTAL_API=${KUBERCOIN_EXPERIMENTAL_API:-1}
      - KUBERCOIN_DEMO_PEERS=${KUBERCOIN_DEMO_PEERS:-2}
      - KUBERCOIN_DEMO_PING_INTERVAL_SECS=${KUBERCOIN_DEMO_PING_INTERVAL_SECS:-2}
    networks:
      - kubercoin-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8634/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Explorer Web UI
  explorer-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - APP_DIR=apps/web/explorer
    container_name: kubercoin-explorer-web
    restart: unless-stopped
    labels:
      com.kubercoin.protected: "true"
      com.kubercoin.lock: "locked"
    ports:
      - "3200:3000"
    environment:
      - KUBERCOIN_RPC_URL=http://node:8634
      - KUBERCOIN_WS_URL=ws://node:8634/ws
      - KUBERCOIN_API_KEY=${KUBERCOIN_API_KEYS:-}
    networks:
      - kubercoin-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    depends_on:
      node:
        condition: service_healthy

  # Wallet Web UI
  wallet-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - APP_DIR=apps/web/wallet
    container_name: kubercoin-wallet-web
    restart: unless-stopped
    labels:
      com.kubercoin.protected: "true"
      com.kubercoin.lock: "locked"
    ports:
      - "3250:3000"
    environment:
      - KUBERCOIN_WALLET_API_URL=http://node:8634
      - KUBERCOIN_WALLET_API_KEY=${KUBERCOIN_API_KEYS:-}
      - KUBERCOIN_WALLET_SHARED_PASSPHRASE=${KUBERCOIN_WALLET_SHARED_PASSPHRASE:-wallet-default-passphrase}
    networks:
      - kubercoin-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    depends_on:
      node:
        condition: service_healthy

  # Operations Web UI
  ops-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - APP_DIR=apps/web/ops
    container_name: kubercoin-ops-web
    restart: unless-stopped
    labels:
      com.kubercoin.protected: "true"
      com.kubercoin.lock: "locked"
    ports:
      - "3300:3000"
    environment:
      - KUBERCOIN_RPC_URL=http://node:8634
      - KUBERCOIN_METRICS_URL=http://node:8634/metrics
      - KUBERCOIN_API_KEY=${KUBERCOIN_API_KEYS:-}
    networks:
      - kubercoin-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    depends_on:
      node:
        condition: service_healthy

  # Main Landing Page (kuber-coin.com)
  web-unified:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - APP_DIR=apps/web/unified
    container_name: kubercoin-landing
    restart: unless-stopped
    labels:
      com.kubercoin.protected: "true"
      com.kubercoin.lock: "locked"
    ports:
      - "3100:3000"
    environment:
      - KUBERCOIN_API_URL=http://node:8634
    networks:
      - kubercoin-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    depends_on:
      node:
        condition: service_healthy

  # Documentation (docs.kuber-coin.com)
  docs-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - APP_DIR=apps/web/docs
    container_name: kubercoin-docs
    restart: unless-stopped
    labels:
      com.kubercoin.protected: "true"
      com.kubercoin.lock: "locked"
    ports:
      - "3400:3000"
    networks:
      - kubercoin-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m

  # DApp Portal (dapp.kuber-coin.com)
  dapp-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - APP_DIR=apps/web/dapp
    container_name: kubercoin-dapp
    restart: unless-stopped
    labels:
      com.kubercoin.protected: "true"
      com.kubercoin.lock: "locked"
    ports:
      - "3500:3000"
    environment:
      - KUBERCOIN_API_URL=http://node:8634
    networks:
      - kubercoin-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    depends_on:
      node:
        condition: service_healthy

  # Node Dashboard (node.kuber-coin.com)
  monitoring-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - APP_DIR=apps/web/monitoring
    container_name: kubercoin-node-dashboard
    restart: unless-stopped
    labels:
      com.kubercoin.protected: "true"
      com.kubercoin.lock: "locked"
    ports:
      - "3600:3000"
    environment:
      - KUBERCOIN_RPC_URL=http://node:8634
      - KUBERCOIN_METRICS_URL=http://node:8634/metrics
      - KUBERCOIN_API_KEY=${KUBERCOIN_API_KEYS:-}
    networks:
      - kubercoin-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    depends_on:
      node:
        condition: service_healthy

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: kubercoin-prometheus
    restart: unless-stopped
    labels:
      com.kubercoin.protected: "true"
      com.kubercoin.lock: "locked"
    ports:
      - "9092:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - kubercoin-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    depends_on:
      node:
        condition: service_healthy

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: kubercoin-grafana
    restart: unless-stopped
    labels:
      com.kubercoin.protected: "true"
      com.kubercoin.lock: "locked"
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - kubercoin-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
    depends_on:
      - prometheus

  # PostgreSQL for indexer (optional)
  postgres:
    image: postgres:15-alpine
    container_name: kubercoin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=kubercoin
      - POSTGRES_USER=${POSTGRES_USER:-kubercoin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    networks:
      - kubercoin-network
    profiles:
      - indexer

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: kubercoin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - kubercoin-network
    profiles:
      - cache

volumes:
  # external=true means these volumes are NEVER removed by 'docker compose down -v'
  # To genuinely delete data you must run: docker volume rm kubercoin_kubercoin-data
  kubercoin-data:
    external: true
    name: kubercoin_kubercoin-data
  prometheus-data:
    external: true
    name: kubercoin_prometheus-data
  grafana-data:
    external: true
    name: kubercoin_grafana-data
  # Optional service volumes (not external — created on demand)
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  kubercoin-network:
    driver: bridge
