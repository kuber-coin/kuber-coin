name: Fuzz

'on':
  pull_request:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'core/tests/fuzz/**'
  schedule:
    # Run nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # PR runs: 60 s (fast feedback).  Nightly / manual runs: 600 s (10 min).
  MAX_FUZZ_TIME: ${{ github.event_name == 'pull_request' && '60' || '600' }}

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # ── Existing targets ────────────────────────────────────────────
          - fuzz_transaction
          - fuzz_script
          - fuzz_block
          - fuzz_p2p_message
          - fuzz_psbt
          - fuzz_difficulty
          - fuzz_address
          # ── New targets ─────────────────────────────────────────────────
          - fuzz_psbt_deserialize
          - fuzz_descriptor
          - fuzz_rpc_json
          - fuzz_stratum
          - fuzz_utxo_decompress
          - fuzz_bech32m
          - fuzz_hd_wallet
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core/tests/fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Restore fuzzing corpus
        id: corpus-restore
        uses: actions/cache/restore@v4
        with:
          path: core/tests/fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzzer (${{ matrix.target }}, ${{ env.MAX_FUZZ_TIME }}s)
        run: |
          mkdir -p corpus/${{ matrix.target }}
          cargo fuzz run ${{ matrix.target }} corpus/${{ matrix.target }} -- -max_total_time=${{ env.MAX_FUZZ_TIME }}
        working-directory: core/tests/fuzz

      - name: Save fuzzing corpus
        if: always()
        uses: actions/cache/save@v4
        with:
          path: core/tests/fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: core/tests/fuzz/artifacts/${{ matrix.target }}
          retention-days: 30
