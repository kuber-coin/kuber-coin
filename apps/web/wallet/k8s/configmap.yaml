apiVersion: v1
kind: ConfigMap
metadata:
  name: wallet-config
  namespace: wallet-production
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_NETWORK: "mainnet"
  NEXT_PUBLIC_NODE_URL: "https://api.kuber-coin.com"
  NEXT_PUBLIC_EXPLORER_URL: "https://explorer.kuber-coin.com"
  NEXT_PUBLIC_WS_URL: "wss://api.kuber-coin.com/ws"
  API_RATE_LIMIT: "100"
  API_TIMEOUT: "30000"
  SESSION_TIMEOUT: "30"
  PASSWORD_MIN_LENGTH: "8"
  ENABLE_MULTISIG: "true"
  ENABLE_COLD_STORAGE: "true"
  ENABLE_ATOMIC_SWAPS: "true"
  ENABLE_STAKING: "true"
  ENABLE_DEFI: "true"
  ENABLE_NFT: "true"
  ENABLE_PRIVACY_TOOLS: "true"
  ENABLE_MOBILE_SYNC: "true"
  ENABLE_AUDIT_LOG: "true"
  PRICE_UPDATE_INTERVAL: "60"
  DEBUG: "false"
  LOG_LEVEL: "info"
  ENABLE_CACHE: "true"
  CACHE_TTL: "300"
